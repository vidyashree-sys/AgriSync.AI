<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSync.AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .sidebar { background: rgba(255, 255, 255, 0.05); min-height: 100vh; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: #94a3b8; transition: 0.3s; margin-bottom: 10px; border-radius: 8px; }
        .nav-link:hover, .nav-link.active { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .bento-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar">
            <h3 class="text-success fw-bold mb-4">AgriSync.AI</h3>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'market_trends' %}active{% endif %}" href="{% url 'market_trends' %}">
                        <i class="bi bi-graph-up-arrow me-2"></i> Market Trends
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'disease_lab' %}active{% endif %}" href="{% url 'disease_lab' %}">
                        <i class="bi bi-virus me-2"></i> Disease Lab
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'blockchain_ledger' %}active{% endif %}" href="{% url 'blockchain_ledger' %}">
                        <i class="bi bi-shield-check me-2"></i> Ledger
                    </a>
                </li>
            </ul>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
