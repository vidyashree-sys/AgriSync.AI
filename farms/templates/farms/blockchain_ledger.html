{% extends 'base.html' %}
{% block content %}
<div class="container-fluid p-0">
    <h1 class="display-6 fw-bold mb-4">Blockchain Ledger</h1>
    
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="bento-card">
                <small class="text-muted text-uppercase fw-bold">Verified Blocks</small>
                <h2 class="fw-bold m-0 mt-2">1,284</h2>
            </div>
        </div>
        </div>

    <div class="bento-card p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle" style="color: var(--text-main);">
                <thead style="background: rgba(0,0,0,0.2);">
                    <tr>
                        <th class="p-4 border-0">TX ID</th>
                        <th class="border-0">ACTION</th>
                        <th class="border-0">TIMESTAMP</th>
                        <th class="text-end p-4 border-0">STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr style="border-bottom: 1px solid var(--card-border);">
                        <td class="p-4"><code style="color: var(--accent); font-weight: bold;">#{{ log.id }}</code></td>
                        <td class="fw-semibold">{{ log.action }}</td>
                        <td class="text-muted">{{ log.timestamp }}</td>
                        <td class="text-end p-4"><span class="badge bg-success bg-opacity-25 text-success rounded-pill px-3">Verified</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
