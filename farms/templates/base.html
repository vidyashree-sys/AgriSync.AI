<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSync | Smart Farming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --agri-green: #2e7d32; --agri-light: #e8f5e9; }
        body { background-color: #f4f7f6; }
        .navbar { background-color: var(--agri-green); shadow: 0 2px 4px rgba(0,0,0,.1); }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .btn-primary { background-color: var(--agri-green); border: none; }
        .btn-primary:hover { background-color: #1b5e20; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚜 AgriSync</a>
            <div class="ms-auto">
                {% if user.is_authenticated %}
                    <span class="text-light me-3">Hi, {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
