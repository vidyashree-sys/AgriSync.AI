{% extends 'base.html' %}
{% block content %}
<div class="container text-center">
    <h1 class="display-5 fw-bold mb-3" style="color: #ffffff !important;">AI Disease Diagnostic Lab</h1>
    <p class="text-muted mb-5">Upload a crop leaf photo for real-time treatment recommendations.</p>

    <div class="bento-card p-5 mx-auto shadow-lg" style="max-width: 800px; border: 2px dashed var(--accent);">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-4">
                <i class="bi bi-upc-scan display-1 mb-3" style="color: var(--accent);"></i>
                <h3 class="text-white">Scan Your Crop</h3>
                <input type="file" name="image" class="form-control bg-dark text-white border-secondary mt-3" required>
            </div>
            <button type="submit" class="btn btn-success btn-lg rounded-pill px-5 fw-bold">START AI ANALYSIS</button>
        </form>

        {% if diagnosis %}
        <div class="mt-5 p-4 rounded-4 text-start bg-dark border border-success">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="m-0 text-success">Diagnosis Result</h4>
                <button onclick="speakResult()" class="btn btn-outline-success rounded-circle">
                    <i class="bi bi-volume-up-fill"></i>
                </button>
            </div>
            <div id="diagnosis-text" class="text-white fs-5">{{ diagnosis }}</div>
        </div>
        {% endif %}
    </div>
</div>

<script>
    function speakResult() {
        const text = document.getElementById('diagnosis-text').innerText;
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = document.getElementById('langSelect').value;
        window.speechSynthesis.speak(speech);
    }
</script>
{% endblock %}
